name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  # Opt in to the Node.js 24 runtime for JavaScript actions. GitHub will make
  # this the default in June 2026; opting in now silences the deprecation
  # warnings and exercises the new runtime ahead of the forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ActuarialAddIn.sln

    - name: "Build (multi-target: net48 + net8.0-windows)"
      run: dotnet build ActuarialAddIn.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet run --project src/ActuarialAddIn.Tests/ActuarialAddIn.Tests.csproj --configuration Release -- test_results.md

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test_results.md

    - name: Upload Add-In Outputs JSON
      uses: actions/upload-artifact@v4
      with:
        name: addin-outputs-json
        path: tests/fixtures/addin_outputs.json

    - name: Upload Add-In (net48)
      uses: actions/upload-artifact@v4
      with:
        name: actuarial-addin-net48
        path: |
          src/ActuarialAddIn/bin/Release/net48/publish/*.xll

    - name: Upload Add-In (net8)
      uses: actions/upload-artifact@v4
      with:
        name: actuarial-addin-net8
        path: |
          src/ActuarialAddIn/bin/Release/net8.0-windows/publish/*.xll

  reconcile:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Download Add-In Outputs JSON
      uses: actions/download-artifact@v4
      with:
        name: addin-outputs-json
        path: tests/fixtures/

    - name: Install Python deps
      run: pip install -r tests/requirements.txt

    - name: Regenerate notebook from source
      run: python tests/build_reconciliation_notebook.py

    - name: Execute reconciliation notebook (Basic must pass)
      run: papermill tests/reconciliation.ipynb tests/reconciliation_executed.ipynb --log-output

    - name: Upload executed notebook
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reconciliation-executed
        path: tests/reconciliation_executed.ipynb

  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: "Build Release (multi-target: net48 + net8.0-windows)"
      run: dotnet build ActuarialAddIn.sln --configuration Release

    - name: Stage release assets (net48 keeps primary names; net8 suffixed)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path release | Out-Null
        Copy-Item src/ActuarialAddIn/bin/Release/net48/publish/ActuarialAddIn-AddIn-packed.xll release/
        Copy-Item src/ActuarialAddIn/bin/Release/net48/publish/ActuarialAddIn-AddIn64-packed.xll release/
        Copy-Item src/ActuarialAddIn/bin/Release/net8.0-windows/publish/ActuarialAddIn-AddIn-packed.xll release/ActuarialAddIn-AddIn-packed-net8.xll
        Copy-Item src/ActuarialAddIn/bin/Release/net8.0-windows/publish/ActuarialAddIn-AddIn64-packed.xll release/ActuarialAddIn-AddIn64-packed-net8.xll

    - name: Upload Release Assets
      # Pinned to commit SHA (softprops/action-gh-release v2) per
      # pinned to a specific commit SHA to avoid tag-hijack on a floating
      # floating v1/v2 tag.
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
      with:
        files: release/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
