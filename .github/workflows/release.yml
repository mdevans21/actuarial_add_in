name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v1.0.0

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore src/ActuarialAddIn/ActuarialAddIn.csproj

    - name: Build Release
      run: dotnet build src/ActuarialAddIn/ActuarialAddIn.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish src/ActuarialAddIn/ActuarialAddIn.csproj --configuration Release --no-build

    - name: Create Release
      # Pinned to commit SHA (softprops/action-gh-release v2) per
      #; pinned to a specific commit SHA to avoid tag-hijack.
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
      with:
        files: |
          src/ActuarialAddIn/bin/Release/net6.0-windows/publish/ActuarialAddIn-AddIn64-packed.xll
          src/ActuarialAddIn/bin/Release/net6.0-windows/publish/ActuarialAddIn-AddIn-packed.xll
          excel/actuarial_add_in.xlsx
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
