name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v1.0.0

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore src/ActuarialAddIn/ActuarialAddIn.csproj

    - name: Build Release
      run: dotnet build src/ActuarialAddIn/ActuarialAddIn.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish src/ActuarialAddIn/ActuarialAddIn.csproj --configuration Release --no-build

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          src/ActuarialAddIn/bin/Release/net6.0-windows/publish/ActuarialAddIn-AddIn64-packed.xll
          src/ActuarialAddIn/bin/Release/net6.0-windows/publish/ActuarialAddIn-AddIn-packed.xll
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
