name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v1.0.0

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '8.0.x'

    - name: Verify release tag matches source version
      shell: pwsh
      run: |
        $version = (Select-String -Path src/ActuarialAddIn/VersionInfo.cs -Pattern 'CurrentVersion = "([^"]+)"').Matches[0].Groups[1].Value
        if ($env:GITHUB_REF_NAME -ne "v$version") { throw "Tag $env:GITHUB_REF_NAME does not match source version v$version" }

    - name: Restore dependencies
      run: dotnet restore ActuarialAddIn.sln

    - name: "Build Release (multi-target: net48 + net8.0-windows)"
      run: dotnet build ActuarialAddIn.sln --configuration Release --no-restore

    - name: Run Tests
      run: dotnet run --project src/ActuarialAddIn.Tests/ActuarialAddIn.Tests.csproj --configuration Release -- test_results.md

    - name: Upload Add-In Outputs JSON
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: addin-outputs-json
        path: tests/fixtures/addin_outputs.json

  reconcile:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.11'

    - name: Download Add-In Outputs JSON
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: addin-outputs-json
        path: tests/fixtures/

    - name: Install Python deps
      run: pip install -r tests/requirements.txt

    - name: Regenerate notebook from source
      run: python tests/build_reconciliation_notebook.py

    - name: Execute reconciliation notebook
      run: papermill tests/reconciliation.ipynb tests/reconciliation_executed.ipynb --log-output

  release:
    needs: [build, reconcile]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ActuarialAddIn.sln

    - name: "Build release assets (multi-target: net48 + net8.0-windows)"
      run: dotnet build ActuarialAddIn.sln --configuration Release --no-restore

    - name: Stage release assets (net48 keeps primary names; net8 suffixed)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path release | Out-Null
        Copy-Item src/ActuarialAddIn/bin/Release/net48/publish/ActuarialAddIn-AddIn-packed.xll release/
        Copy-Item src/ActuarialAddIn/bin/Release/net48/publish/ActuarialAddIn-AddIn64-packed.xll release/
        Copy-Item src/ActuarialAddIn/bin/Release/net8.0-windows/publish/ActuarialAddIn-AddIn-packed.xll release/ActuarialAddIn-AddIn-packed-net8.xll
        Copy-Item src/ActuarialAddIn/bin/Release/net8.0-windows/publish/ActuarialAddIn-AddIn64-packed.xll release/ActuarialAddIn-AddIn64-packed-net8.xll
        Copy-Item excel/actuarial_add_in.xlsx release/

    - name: Create Release
      # Pinned to commit SHA (softprops/action-gh-release v2) per
      #; pinned to a specific commit SHA to avoid tag-hijack.
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
      with:
        files: release/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
